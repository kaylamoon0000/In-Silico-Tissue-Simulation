<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Multicellular Reaction–Diffusion Simulator</title>

<style>
body {
  margin: 0;
  background: #111;
  color: white;
  font-family: Arial;
}

#container {
  display: flex;
}

canvas {
  border: 1px solid #444;
}

#panel {
  width: 260px;
  padding: 10px;
  background: #1b1b1b;
}

select {
  width: 100%;
  height: 200px;
}

button {
  margin-top: 5px;
  width: 100%;
}

#desc {
  font-size: 12px;
  margin-top: 10px;
  min-height: 40px;
}
</style>
</head>

<body>
<div id="container">
  <canvas id="canvas" width="700" height="700"></canvas>

  <div id="panel">
    <h3>Cell Types</h3>
    <select id="cellType" multiple></select>
    <div id="desc">Hover to see description</div>

    <h3>Simulation Controls</h3>
    <button id="pauseBtn">Pause</button>
    <button id="resetBtn">Reset</button>

    <p style="font-size:12px;">
      Space = Pause/Resume<br>
      R = Reset
    </p>
  </div>
</div>

<script>
/* =========================
   CELL DEFINITIONS
========================= */
const CELL_TYPES = {
 neuron: {color:"#FFD700", signal:"#00FFFF", sec:0.04, burst:true, desc:"Neuron – releases neurotransmitters in bursts"},
 astrocyte: {color:"#FF66CC", signal:"#00FFAA", sec:0.02, burst:false, desc:"Astrocyte – maintains extracellular homeostasis"},
 microglia: {color:"#FF8C00", signal:"#FF0000", sec:0.06, burst:true, desc:"Microglia – inflammatory cytokine release"},
 glioblastoma: {color:"#990000", signal:"#FF5555", sec:0.08, burst:false, desc:"Glioblastoma – continuous tumor signaling"},
 stem: {color:"#00FFFF", signal:"#00FF00", sec:0.03, burst:false, desc:"Stem cell – trophic factor secretion"}
};

/* =========================
   MENU POPULATION
========================= */
const select = document.getElementById("cellType");
const desc = document.getElementById("desc");

for (let key in CELL_TYPES) {
  const opt = document.createElement("option");
  opt.value = key;
  opt.textContent = key;
  opt.onmouseover = () => desc.textContent = CELL_TYPES[key].desc;
  select.appendChild(opt);
}

/* =========================
   GRID SETUP
========================= */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const N = 120;
const cellSize = canvas.width / N;

let fields = {
  neurotransmitter: Array.from({length:N},()=>Array(N).fill(0)),
  cytokine: Array.from({length:N},()=>Array(N).fill(0)),
  growth: Array.from({length:N},()=>Array(N).fill(0))
};

let nextFields = JSON.parse(JSON.stringify(fields));
let cells = [];
let running = true;

/* =========================
   ADD CELLS
========================= */
canvas.onclick = e => {
  const rect = canvas.getBoundingClientRect();
  const x = Math.floor((e.clientX - rect.left)/cellSize);
  const y = Math.floor((e.clientY - rect.top)/cellSize);

  const chosen = Array.from(select.selectedOptions).map(o=>o.value);

  chosen.forEach(type => {
    cells.push({x,y,type,timer:0});
  });
};

/* =========================
   DIFFUSION STEP
========================= */
function diffuse(field, next, diff, decay){
  for(let i=1;i<N-1;i++){
    for(let j=1;j<N-1;j++){
      const lap = field[i-1][j]+field[i+1][j]+field[i][j-1]+field[i][j+1]-4*field[i][j];
      next[i][j] = field[i][j] + diff*lap - decay*field[i][j];
    }
  }
}

/* =========================
   SIMULATION STEP
========================= */
function step(){
  diffuse(fields.neurotransmitter, nextFields.neurotransmitter, 0.08, 0.002);
  diffuse(fields.cytokine, nextFields.cytokine, 0.05, 0.001);
  diffuse(fields.growth, nextFields.growth, 0.03, 0.0005);

  cells.forEach(c=>{
    const def = CELL_TYPES[c.type];

    let field;
    if(c.type==="neuron") field = nextFields.neurotransmitter;
    else if(c.type==="microglia" || c.type==="glioblastoma") field = nextFields.cytokine;
    else field = nextFields.growth;

    if(def.burst){
      if(c.timer < 40) field[c.x][c.y] += def.sec;
      c.timer++;
    } else {
      field[c.x][c.y] += def.sec;
    }
  });

  fields = JSON.parse(JSON.stringify(nextFields));
}

/* =========================
   DRAW
========================= */
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let i=0;i<N;i++){
    for(let j=0;j<N;j++){
      const n = fields.neurotransmitter[i][j];
      const c = fields.cytokine[i][j];
      const g = fields.growth[i][j];

      if(n>0) {
        ctx.fillStyle = `rgba(0,255,255,${Math.min(n,1)})`;
        ctx.fillRect(i*cellSize,j*cellSize,cellSize,cellSize);
      }
      if(c>0) {
        ctx.fillStyle = `rgba(255,0,0,${Math.min(c,1)})`;
        ctx.fillRect(i*cellSize,j*cellSize,cellSize,cellSize);
      }
      if(g>0) {
        ctx.fillStyle = `rgba(0,255,0,${Math.min(g,1)})`;
        ctx.fillRect(i*cellSize,j*cellSize,cellSize,cellSize);
      }
    }
  }

  cells.forEach(c=>{
    ctx.fillStyle = CELL_TYPES[c.type].color;
    ctx.beginPath();
    ctx.arc(c.x*cellSize+cellSize/2,c.y*cellSize+cellSize/2,cellSize/2,0,Math.PI*2);
    ctx.fill();
  });
}

/* =========================
   CONTROLS
========================= */
document.getElementById("pauseBtn").onclick = () => running = !running;
document.getElementById("resetBtn").onclick = () => {
  fields = {
    neurotransmitter: Array.from({length:N},()=>Array(N).fill(0)),
    cytokine: Array.from({length:N},()=>Array(N).fill(0)),
    growth: Array.from({length:N},()=>Array(N).fill(0))
  };
  cells = [];
};

document.onkeydown = e => {
  if(e.code === "Space") running = !running;
  if(e.key === "r") document.getElementById("resetBtn").click();
};

/* =========================
   LOOP
========================= */
function loop(){
  if(running) step();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
